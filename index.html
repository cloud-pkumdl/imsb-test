<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMSB 结构生物学人格测试</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  min-height: 100vh;
  color: #e0e0e0;
  overflow-x: hidden;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Landing page */
.landing {
  text-align: center;
  animation: fadeIn 0.8s ease;
}

.landing h1 {
  font-size: 2.4em;
  margin-bottom: 12px;
  background: linear-gradient(90deg, #f093fb, #f5576c, #4facfe, #00f2fe);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s linear infinite;
}

.landing .subtitle {
  font-size: 1.1em;
  color: #aaa;
  margin-bottom: 8px;
}

.landing .desc {
  font-size: 0.95em;
  color: #888;
  margin-bottom: 32px;
  line-height: 1.6;
}

.btn-start {
  display: inline-block;
  padding: 14px 48px;
  font-size: 1.1em;
  font-weight: 600;
  color: #fff;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
}

.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(102, 126, 234, 0.6);
}

.btn-start:active {
  transform: translateY(0);
}

/* Progress bar */
.progress-bar {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  margin-bottom: 32px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Question area */
.question-area {
  width: 100%;
  animation: fadeIn 0.5s ease;
}

.q-number {
  font-size: 0.85em;
  color: #888;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.q-text {
  font-size: 1.25em;
  font-weight: 600;
  color: #fff;
  margin-bottom: 24px;
  line-height: 1.5;
}

/* Option cards */
.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.option-card {
  padding: 16px 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s ease;
  line-height: 1.5;
  font-size: 0.95em;
}

.option-card:hover {
  background: rgba(102, 126, 234, 0.15);
  border-color: rgba(102, 126, 234, 0.5);
  transform: translateX(4px);
}

.option-card:active {
  transform: translateX(2px);
  background: rgba(102, 126, 234, 0.25);
}

.option-card .option-label {
  font-weight: 700;
  color: #764ba2;
  margin-right: 8px;
}

/* Result page */
.result-area {
  width: 100%;
  text-align: center;
  animation: fadeIn 0.6s ease;
}

.result-avatar {
  width: 143px;
  height: 190px;
  border-radius: 16px;
  object-fit: cover;
  border: 3px solid rgba(102, 126, 234, 0.6);
  box-shadow: 0 4px 24px rgba(102, 126, 234, 0.3);
  margin-bottom: 16px;
  background: rgba(255,255,255,0.05);
}

.result-code {
  display: inline-block;
  padding: 4px 16px;
  font-size: 0.85em;
  font-weight: 700;
  letter-spacing: 2px;
  color: #fff;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 20px;
  margin-bottom: 12px;
}

.result-name {
  font-size: 1.6em;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
}

.result-field {
  font-size: 0.95em;
  color: #aaa;
  margin-bottom: 20px;
}

.result-quote {
  font-style: italic;
  font-size: 0.95em;
  color: #ccc;
  background: rgba(255,255,255,0.03);
  border-left: 3px solid #764ba2;
  padding: 12px 16px;
  margin: 0 0 20px 0;
  text-align: left;
  border-radius: 0 8px 8px 0;
  line-height: 1.6;
}

.result-desc {
  font-size: 0.95em;
  color: #ddd;
  line-height: 1.7;
  text-align: left;
  margin-bottom: 16px;
}

.result-tip {
  background: rgba(76, 175, 80, 0.1);
  border: 1px solid rgba(76, 175, 80, 0.3);
  border-radius: 10px;
  padding: 12px 16px;
  text-align: left;
  font-size: 0.9em;
  color: #a5d6a7;
  margin-bottom: 16px;
  line-height: 1.6;
}

.result-tip::before {
  content: "💡 ";
}

.flavor-badge {
  display: inline-block;
  padding: 6px 16px;
  font-size: 0.85em;
  color: #ffd54f;
  background: rgba(255, 213, 79, 0.1);
  border: 1px solid rgba(255, 213, 79, 0.3);
  border-radius: 20px;
  margin-bottom: 24px;
}

.btn-retry {
  display: inline-block;
  padding: 12px 36px;
  font-size: 1em;
  font-weight: 600;
  color: #fff;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.btn-retry:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Hidden */
.hidden {
  display: none !important;
}

/* Mobile tweaks */
@media (max-width: 480px) {
  .container {
    padding: 16px;
  }
  .landing h1 {
    font-size: 1.8em;
  }
  .q-text {
    font-size: 1.1em;
  }
  .option-card {
    padding: 14px 16px;
    font-size: 0.9em;
  }
  .result-name {
    font-size: 1.3em;
  }
}

.result-tagline {
  font-size: 0.95em;
  color: #ccc;
  margin-bottom: 16px;
  line-height: 1.5;
}

.result-name-label {
  font-size: 0.85em;
  color: #888;
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.result-dimensions {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 20px;
  text-align: left;
}

.result-dimensions .dim-title {
  font-size: 0.8em;
  color: #888;
  letter-spacing: 1px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.result-dimensions .dim-item {
  font-size: 0.9em;
  color: #ccc;
  line-height: 1.8;
}

.result-dimensions .dim-letter {
  font-weight: 700;
  color: #a78bfa;
  margin-right: 6px;
}
</style>
</head>

  { name: "Brian Kobilka", code: "ISFJ", tagline: "药物设计的幕后英雄 — 你解的结构，直接写进了处方笺", field: "GPCR", quote: "\u4e00\u4e2a\u597d\u7684\u7ed3\u6784\uff0c\u5e94\u8be5\u8ba9\u836f\u7269\u5316\u5b66\u5bb6\u770b\u4e86\u5c31\u77e5\u9053\u4e0b\u4e00\u6b65\u8be5\u5408\u6210\u4ec0\u4e48\u3002", desc: "\u4f60\u505a\u7ed3\u6784\u4e0d\u662f\u4e3a\u4e86\u53d1paper\u2014\u2014\u4f60\u662f\u771f\u5fc3\u60f3\u89e3\u51b3\u4e34\u5e8a\u95ee\u9898\u3002\u4f60\u76f8\u4fe1\u7ed3\u6784\u751f\u7269\u5b66\u6700\u7ec8\u8981\u4e3a\u836f\u7269\u8bbe\u8ba1\u670d\u52a1\uff0c\u6bcf\u4e00\u4e2abinding pocket\u7684\u7ec6\u8282\u90fd\u53ef\u80fd\u62ef\u6551\u4e00\u6761\u751f\u547d\u3002\u4f60\u52a1\u5b9e\u3001\u4f4e\u8c03\uff0c\u4f46\u5185\u5fc3\u6709\u6539\u53d8\u4e16\u754c\u7684\u91ce\u5fc3\u3002", tip: "\u4f60\u53ef\u80fd\u4e5f\u4f1a\u5728\u6c47\u62a5\u7ed3\u675f\u540e\u95ee\u5408\u4f5c\u65b9\u201c\u8fd9\u4e2a\u7ed3\u6784\u5bf9\u4f60\u4eec\u7684\u9879\u76ee\u6709\u5e2e\u52a9\u5417\u201d\u3002" },
  { name: "Rod MacKinnon", code: "ISTJ", tagline: "精巧机制的守望者 — 一个通道，一辈子，每个原子都有它的道理", field: "\u79bb\u5b50\u901a\u9053", quote: "\u5982\u679c\u4f60\u771f\u6b63\u7406\u89e3\u4e86\u9009\u62e9\u6027\u6ee4\u5668\uff0c\u4f60\u5c31\u7406\u89e3\u4e86\u8fdb\u5316\u51e0\u5341\u4ebf\u5e74\u7684\u6781\u81f4\u5de5\u7a0b\u3002", desc: "\u4f60\u662f\u90a3\u79cd\u80fd\u76ef\u7740\u4e00\u4e2a2 \u00c5\u7ed3\u6784\u6c89\u601d\u534a\u5c0f\u65f6\u7684\u4eba\u3002\u5bf9\u4f60\u6765\u8bf4\uff0c\u6700\u7f8e\u7684\u4e1c\u897f\u4e0d\u662f\u6700\u5927\u6216\u6700\u65b0\u7684\u7ed3\u6784\uff0c\u800c\u662f\u4e00\u4e2a\u7cbe\u5de7\u7684\u673a\u5236\u5728\u539f\u5b50\u5c42\u9762\u7684\u5b8c\u7f8e\u5448\u73b0\u3002\u4f60\u8ffd\u6c42\u7684\u662f\u201c\u5f7b\u5e95\u7406\u89e3\u201d\u800c\u975e\u201c\u5feb\u901f\u53d1\u8868\u201d\u3002", tip: "\u4f60\u53ef\u80fd\u4e5f\u4f1a\u56e0\u4e3a\u4e00\u4e2acarbonyl oxygen\u7684\u671d\u5411\u53d1\u8868\u4e00\u7bc7Cell\u3002" },
  { name: "Richard Henderson", code: "INTP", tagline: "方法学的元思考者 — 不解决问题，解决‘解决问题的方式’", field: "cryo-EM \u65b9\u6cd5\u5b66", quote: "\u65b9\u6cd5\u5b66\u7684\u7a81\u7834\u662f\u6240\u6709\u540e\u7eed\u53d1\u73b0\u7684\u524d\u63d0\u3002\u5de5\u5177\u51b3\u5b9a\u4e86\u4f60\u80fd\u770b\u591a\u8fdc\u3002", desc: "\u4f60\u76f8\u4fe1\u201c\u5de5\u6b32\u5584\u5176\u4e8b\uff0c\u5fc5\u5148\u5229\u5176\u5668\u201d\u3002\u5f53\u522b\u4eba\u5728\u7528\u73b0\u6709\u6280\u672f\u53d1paper\u65f6\uff0c\u4f60\u5728\u601d\u8003\u5982\u4f55\u8ba9\u6280\u672f\u672c\u8eab\u66f4\u597d\u3002\u4f60\u6709\u4e00\u79cd\u201c\u5143\u601d\u7ef4\u201d\u2014\u2014\u4e0d\u4ec5\u60f3\u89e3\u51b3\u95ee\u9898\uff0c\u66f4\u60f3\u6539\u8fdb\u89e3\u51b3\u95ee\u9898\u7684\u65b9\u6cd5\u672c\u8eab\u3002", tip: "\u4f60\u53ef\u80fd\u4e5f\u4f1a\u82b1\u4e09\u4e2a\u6708\u5199\u4e00\u4e2a\u6570\u636e\u5904\u7406\u811a\u672c\uff0c\u7136\u540e\u7528\u5b83\u5728\u4e24\u5929\u5185\u89e3\u51fa\u4e94\u4e2a\u7ed3\u6784\u3002" },
  { name: "Jennifer Doudna", code: "ENFJ", tagline: "从机制到工具的架桥人 — 看见结构就想'这能不能变成改造生命的工具'", field: "CRISPR / RNA", quote: "\u7ed3\u6784\u544a\u8bc9\u6211\u4eecCRISPR\u5982\u4f55\u5de5\u4f5c\u3002\u4f46\u771f\u6b63\u6fc0\u52a8\u4eba\u5fc3\u7684\u662f\uff0c\u6211\u4eec\u80fd\u7528\u5b83\u505a\u4ec0\u4e48\u3002", desc: "\u4f60\u662f\u201c\u4ece\u7ed3\u6784\u5230\u5e94\u7528\u201d\u7684\u6781\u81f4\u4ee3\u8868\u3002\u4f60\u4e0d\u4f1a\u505c\u7559\u5728\u539f\u5b50\u5750\u6807\u4e0a\u2014\u2014\u4f60\u603b\u5728\u60f3\u201c\u8fd9\u4e2a\u673a\u5236\u80fd\u4e0d\u80fd\u53d8\u6210\u4e00\u4e2a\u5de5\u5177\u201d\u3002\u4f60\u6709\u8fdc\u89c1\uff0c\u6709\u9b44\u529b\uff0c\u6562\u4e8e\u8de8\u51fa\u7ed3\u6784\u751f\u7269\u5b66\u7684\u8212\u9002\u533a\u53bb\u6539\u53d8\u6574\u4e2a\u751f\u7269\u5b66\u3002", tip: "\u4f60\u53ef\u80fd\u4e5f\u4f1a\u5728\u7ec4\u4f1a\u4e0a\u8bf4\u201c\u5982\u679c\u8fd9\u4e2a\u9176\u80fd\u88ab\u91cd\u7f16\u7a0b\u7684\u8bdd\u2026\u201d\u7136\u540e\u5f00\u542f\u4e00\u4e2a\u5341\u5e74\u7684\u9879\u76ee\u3002" },
  { name: "Brenda Schulman", code: "INTJ", tagline: "分子逻辑的系统架构师 — 拆解整个蛋白质家族的工作原理", field: "\u6cdb\u7d20-\u86cb\u767d\u964d\u89e3", quote: "E3\u8fde\u63a5\u9176\u7684\u590d\u6742\u6027\u4e0d\u662f\u8d1f\u62c5\uff0c\u662fevolution\u7559\u7ed9\u6211\u4eec\u7684\u5bc6\u7801\u672c\u3002", desc: "\u4f60\u70ed\u7231\u7cfb\u7edf\u6027\u5730\u62c6\u89e3\u590d\u6742\u5206\u5b50\u673a\u5668\u3002\u4f60\u6709\u7740\u6781\u5f3a\u7684\u65b9\u6cd5\u8bba\u610f\u8bc6\u2014\u2014\u4e0d\u4ec5\u8981\u89e3\u51fa\u7ed3\u6784\uff0c\u8fd8\u8981\u5efa\u7acb\u4e00\u5957\u6846\u67b6\u6765\u7406\u89e3\u4e00\u6574\u4e2a\u86cb\u767d\u8d28\u5bb6\u65cf\u7684\u5de5\u4f5c\u539f\u7406\u3002\u4f60\u662f\u201c\u7ed3\u6784+\u751f\u5316+\u7ec6\u80de\u201d\u4e09\u4f4d\u4e00\u4f53\u7684\u5fe0\u5b9e\u62e5\u8db8\u3002", tip: "\u4f60\u53ef\u80fd\u4e5f\u4f1a\u5bf9\u7740ubiquitin chain\u7684\u5206\u652f\u753b\u51fa\u4e00\u5f20\u6bd4\u5730\u94c1\u7ebf\u8def\u56fe\u8fd8\u590d\u6742\u7684\u4fe1\u53f7\u7f51\u7edc\u3002" },

  { name: "Andres Leschziner", code: "ISFP", tagline: "构象空间的艺术家 — 从噪音中提炼出别人看不见的构象之美", field: "\u5206\u5b50\u9a6c\u8fbe / dynein", quote: "\u597d\u76843D classification\u662f\u4e00\u95e8\u827a\u672f\u3002\u6bcf\u4e2a\u6784\u8c61\u7c7b\u90fd\u662f\u4e00\u4e2afreeze-frame\u3002", desc: "\u4f60\u662f\u6570\u636e\u5206\u6790\u7684\u827a\u672f\u5bb6\u3002\u522b\u4eba\u770b\u5230\u7684\u662f\u5608\u6742\u7684\u7c92\u5b50\u56fe\u50cf\uff0c\u4f60\u770b\u5230\u7684\u662f\u7b49\u5f85\u88ab\u53d1\u6398\u7684\u6784\u8c61\u7a7a\u95f4\u3002\u4f60\u76f8\u4fe1\u8ba1\u7b97\u65b9\u6cd5\u548c\u5b9e\u9a8c\u6570\u636e\u540c\u7b49\u91cd\u8981\uff0c\u6700\u7f8e\u7684\u7ed3\u679c\u6765\u81ea\u5bf9\u6570\u636e\u7684\u6781\u81f4\u6316\u6398\u3002", tip: "\u4f60\u53ef\u80fd\u4e5f\u4f1a\u5728\u51cc\u6668\u4e09\u70b9\u56e0\u4e3a\u53d1\u73b0\u4e86\u4e00\u4e2a\u65b0\u7684\u6784\u8c61\u7c7b\u800c\u53d1\u670b\u53cb\u5708\u3002" },
  { name: "Jue Chen (\u9648\u73cf)", code: "INFP", tagline: "构象验证的设计师 — 每一步实验都像精心编排的对话", field: "ABC \u8f6c\u8fd0\u86cb\u767d", quote: "\u8bbe\u8ba1\u5b9e\u9a8c\u9a8c\u8bc1\u6784\u8c61\u53d8\u5316\u7684\u90a3\u4e00\u523b\uff0c\u6211\u89c9\u5f97\u81ea\u5df1\u5728\u548c\u8fdb\u5316\u5bf9\u8bdd\u3002", desc: "\u4f60\u6709\u4e00\u79cd\u7a00\u6709\u7684\u5929\u8d4b\u2014\u2014\u65e2\u80fd\u5b89\u9759\u5730\u5750\u5728\u7535\u8111\u524d\u5206\u6790\u7ed3\u6784\uff0c\u53c8\u80fd\u5728\u5b66\u672f\u4f1a\u8bae\u4e0a\u9b45\u529b\u56db\u5c04\u5730\u5c55\u793a\u6210\u679c\u3002\u4f60\u505a\u7814\u7a76\u7684\u65b9\u5f0f\u5f88\u201c\u8bbe\u8ba1\u611f\u201d\uff1a\u4ece\u63d0\u51fa\u5047\u8bf4\u5230\u9a8c\u8bc1\uff0c\u6bcf\u4e00\u6b65\u90fd\u7ecf\u8fc7\u7cbe\u5fc3\u7f16\u6392\u3002", tip: "\u4f60\u53ef\u80fd\u4e5f\u4f1a\u8ba9\u7ec4\u91cc\u7684presentation\u6a21\u677f\u6bd4\u4efb\u4f55\u5176\u4ed6lab\u90fd\u597d\u770b\u3002" },
  { name: "Kiyoshi Nagai", code: "ESTP", tagline: "催化现场的侦探 — 在大系统中捕捉转瞬即逝的催化中间态", field: "\u526a\u63a5\u4f53\u50ac\u5316\u673a\u5236", quote: "RNA\u7684\u4e16\u754c\u6bd4\u6211\u4eec\u60f3\u8c61\u7684\u66f4\u53e4\u8001\uff0c\u4e5f\u66f4\u7cbe\u5bc6\u3002\u6bcf\u4e00\u6b65\u50ac\u5316\u90fd\u6709\u5b83\u7684\u7406\u7531\u3002", desc: "\u4f60\u5bf9\u50ac\u5316\u673a\u5236\u6709\u8fd1\u4e4e\u75f4\u8ff7\u7684\u5174\u8da3\u3002\u4f60\u4e0d\u4ec5\u60f3\u770b\u5230\u201c\u662f\u4ec0\u4e48\u201d\uff0c\u66f4\u8981\u7406\u89e3\u201c\u4e3a\u4ec0\u4e48\u662f\u8fd9\u6837\u800c\u4e0d\u662f\u90a3\u6837\u201d\u3002\u4f60\u6709\u7740\u6781\u5f3a\u7684\u5316\u5b66\u76f4\u89c9\uff0c\u5584\u4e8e\u4ece\u7ed3\u6784\u4e2d\u8bfb\u51fa\u53cd\u5e94\u673a\u7406\u7684\u7ebf\u7d22\u3002", tip: "\u4f60\u53ef\u80fd\u4e5f\u4f1a\u5728\u770b\u5230\u4e00\u4e2a\u6d3b\u6027\u4f4d\u70b9\u65f6\u7acb\u523b\u5728\u8111\u4e2d\u6a21\u62df\u4e00\u904d\u50ac\u5316\u5faa\u73af\u3002" },
  { name: "Eva Nogales", code: "ENFP", tagline: "跨尺度的连接者 — 在原子分辨率和细胞动态之间自由切换", field: "\u7ec6\u80de\u9aa8\u67b6 / \u5fae\u7ba1", quote: "\u5fae\u7ba1\u4e0d\u662f\u9759\u6001\u7684\u7ba1\u5b50\u2014\u2014\u5b83\u4eec\u662f\u7ec6\u80de\u5185\u7684\u9ad8\u901f\u516c\u8def\u7cfb\u7edf\uff0c\u65f6\u523b\u5728\u52a8\u6001\u91cd\u7ec4\u3002", desc: "\u4f60\u559c\u6b22\u90a3\u4e9b\u201c\u6d3b\u7684\u201d\u7ed3\u6784\u2014\u2014\u4e0d\u662f\u6676\u683c\u4e2d\u51bb\u4f4f\u7684\u86cb\u767d\u8d28\uff0c\u800c\u662f\u5728\u7ec6\u80de\u4e2d\u65f6\u523b\u53d8\u5316\u7684\u5927\u578b\u7ec4\u88c5\u4f53\u3002\u4f60\u5584\u4e8e\u5c06\u7ed3\u6784\u4fe1\u606f\u4e0e\u7ec6\u80de\u751f\u7269\u5b66\u8054\u7cfb\u8d77\u6765\uff0c\u662f\u90a3\u79cd\u80fd\u628aatomic model\u548cconfocal image\u4e00\u8d77\u770b\u7684\u4eba\u3002", tip: "\u4f60\u53ef\u80fd\u4e5f\u4f1a\u5728\u663e\u5fae\u955c\u5ba4\u548c\u8ba1\u7b97\u96c6\u7fa4\u4e4b\u95f4\u53cd\u590d\u6a2a\u8df3\uff0c\u4e00\u5929\u5207\u6362\u4e09\u79cd\u601d\u7ef4\u6a21\u5f0f\u3002" }
];

// resultMap[row][col] = index into piData
const resultMap = [
  [5, 14, 0, 4],
  [2, 11, 9, 15],
  [7, 1, 6, 12],
  [10, 8, 3, 13]
];

const flavorTexts = [
  "\ud83c\udfdb\ufe0f \u7ecf\u5178\u4e3b\u4e49 \u00b7 \u4f60\u9aa8\u5b50\u91cc\u76f8\u4fe1\u597d\u4e1c\u897f\u7ecf\u5f97\u8d77\u65f6\u95f4\u8003\u9a8c",
  "\ud83d\ude80 \u6280\u672f\u5148\u9a71 \u00b7 \u4f60\u6c38\u8fdc\u5728\u5bfb\u627e\u66f4\u597d\u7684\u65b9\u6cd5",
  "\ud83c\udfaf \u95ee\u9898\u9a71\u52a8 \u00b7 \u5bf9\u4f60\u6765\u8bf4\uff0c\u7b54\u6848\u6bd4\u5de5\u5177\u91cd\u8981",
  "\ud83d\udcd0 \u7406\u8bba\u6d3e \u00b7 \u5148\u60f3\u6e05\u695a\uff0c\u518d\u4f18\u96c5\u5730\u52a8\u624b"
];

const dimDesc = {
  E: "相比于深耕单一靶标，你更倾向构建大系统和平台",
  I: "相比于铺开大系统，你更倾向在一个精巧体系里挖到极致",
  N: "相比于忠于已有结构数据，你更倾向开创新方法新工具",
  S: "相比于追求新方法，你更相信结构数据本身就是最好的证据",
  T: "相比于功能转化和临床应用，你更倾向机制逻辑和理论驱动",
  F: "相比于纯粹的机制解析，你更关注结构能带来什么实际应用",
  J: "相比于追逐新问题，你更倾向十年磨一剑、长期深耕一个体系",
  P: "相比于固守一个方向，你更喜欢灵活转向、快速响应新问题"
};

function getDimHtml(code) {
  var h = '<div class="result-dimensions"><div class="dim-title">你的四维坐标</div>';
  for (var i = 0; i < code.length; i++) {
    var letter = code[i];
    h += '<div class="dim-item"><span class="dim-letter">' + letter + '</span> \u00b7 ' + dimDesc[letter] + '</div>';
  }
  h += '</div>';
  return h;
}

let currentQ = 0;
let answers = [];

function startQuiz() {
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  currentQ = 0;
  answers = [];
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const area = document.getElementById('questionArea');
  area.style.opacity = '0';
  area.style.transform = 'translateY(16px)';
  
  setTimeout(() => {
    let html = '<div class="q-number">' + q.title + '</div>';
    html += '<div class="q-text">' + q.text + '</div>';
    html += '<div class="options">';
    const labels = ['A', 'B', 'C', 'D'];
    q.options.forEach((opt, i) => {
      html += '<div class="option-card" onclick="selectOption(' + i + ')"><span class="option-label">' + labels[i] + '</span>' + opt + '</div>';
    });
    html += '</div>';
    area.innerHTML = html;
    
    requestAnimationFrame(() => {
      area.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
      area.style.opacity = '1';
      area.style.transform = 'translateY(0)';
    });
  }, 150);

  document.getElementById('progressFill').style.width = ((currentQ + 1) / 5 * 100) + '%';
}

function selectOption(idx) {
  answers.push(idx);
  currentQ++;
  if (currentQ >= 5) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quiz').classList.add('hidden');
  
  let row = answers[0]; // Q1
  let col = answers[1]; // Q2
  const flavor = answers[2]; // Q3
  const q4 = answers[3];
  const q5 = answers[4];

  // Q4 微调行
  if (q4 !== row && Math.random() < 0.2) {
    row = q4;
  }

  // Q5 微调列
  const q5ColHint = [0, 2, 3, 0];
  if (q5ColHint[q5] !== col && Math.random() < 0.15) {
    col = q5ColHint[q5];
  }

  const piIdx = resultMap[row][col];
  const pi = piData[piIdx];

  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = '<div class="result-code">' + pi.code + '</div>' +
    '<div class="result-tagline">' + pi.tagline + '</div>' +
    getDimHtml(pi.code) +
    '<img class="result-avatar" src="./portraits/pi_' + piIdx + '.jpg?v=2" alt="' + pi.name + '" onerror="this.style.display=\'none\'">' +
    '<div class="result-name-label">代表性人物：</div>' +
    '<div class="result-name">' + pi.name + '</div>' +
    '<div class="result-field">' + pi.field + '</div>' +
    '<div class="result-quote">\u201c' + pi.quote + '\u201d</div>' +
    '<div class="result-desc">' + pi.desc + '</div>' +
    '<div class="result-tip">' + pi.tip + '</div>' +
    '<div class="flavor-badge">' + flavorTexts[flavor] + '</div>' +
    '<br><br>' +
    '<button class="btn-retry" onclick="retry()">\ud83d\udd04 \u518d\u6d4b\u4e00\u6b21</button>';
  resultDiv.classList.remove('hidden');
}

function retry() {
  document.getElementById('result').classList.add('hidden');
  document.getElementById('landing').classList.remove('hidden');
  currentQ = 0;
  answers = [];
}
</script>
